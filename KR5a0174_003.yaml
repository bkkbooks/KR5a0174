front:
  text: 金蓮正宗記卷之三致六
  hash: sha256:504c69b3df2177dc9ba48517bc4f16fe8f3897e14db773fcb139824c60822579
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0174_HFL_003-001a, image: hfl/0075/0075-160.png}
body:
  text: 林間羽客樗櫟道人編丹陽馬眞人先生寧海人也號曰丹陽子祖諱覺宇華叟通五經爲人信義言無宿諾嘗販繒於鄰境暮憩邸中見一貧婦擗踊哭泣聞人説云此貞婦也良人少亡誓不復嫁孝養舅姑不幸併亡無資以葬方欲質身以爲棺槨之費公正色言曰鄕鄰疾病尚且扶持里有死亡不爲助給非孝義之坊也解縑二束而贈之不通姓氏趨走前邸是夕公之財物爲暴客所劫遂不告人怡然而歸其妻問之託言賒貸後經半載盜者分臟不均經公首露公曰臟物紛紜展轉相關連坐非一枉遭推勘臟滿百疋犯至極刑非好善之所爲也可持銀二兩補爾不平之怒其人遂感謝而去時方歲饑曝米於庭鄰婦竊之公出潜見復隱身而避之任彼將去父諱師揚宇希賢姿貌魁秀沉靜有度量生子五人取仁義禮智信爲名號曰五常馬氏之坊甚富於貲故號曰馬半州弟姪三人皆擢進士故有餘慶堂今改爲降仙坊者是也至辛亥歲饑饉荐臻八月清旦有客倉皇擲紬複於案上輒過門而不知所往公欲收入巾箱間舉之甚重解而觀之金色射目以權衡稱之其重兩鎰旬日客來即奉與之客謝曰吾吕仙也家在幽谷村陶採爲業得金兩鎰欲貨於市税監逼逐幾陷於刑賴公以免願兩分之聊以酬恩公曰横來之金慮招其禍辭而不受吕仙曰公有黄向之風異日子孫當出神仙自後公屢訪幽谷人問吕仙安否僉云素無吕氏之家疑其神人也先生之母所有寳翠爲家婢竊而去之衆人皆言急逐可得公一無所問由是資財益廣享年六十有四先生第二子也諱從義宇宜甫癸卯歲五月二十日子時生母唐氏夢謁麻姑賜丹一粒吞而分瑞體如火色七日方消手握雙拳百日乃舒爲兒時常誦乘雲駕鶴之語夢中屢從道士登天良賤四十餘口每斂退食器舌舐殘粒身服舊裳昔道士李無夢鍊大丹於崑崙三載弗成曰神仙降臨則丹成矣一旦先生與豪傑相從遊戲至於爐下丹乃轉成無夢見而奇之謂先生曰額有三山手垂過膝眞大仙之材矣因爲頌曰身體堂堂面圓耳長眉脩目俊準直口方相好具足頂有神光宜甫受記同步蓬莊厥丹乃成先生之德因此見稱孫忠顯美無夢之言以女妻之生子三人曰廷珍廷瑞廷珪先生以孝悌見稱夙賦聰明長通經史好與童稚戲狎輕財重義出舉收質無可入還者皆焚其券大定二年秋蝗大饑佃客劉進盜殺耕牛將盡遽往視之曰年穀不登困乏糧食吾將賑濟汝不念牛爲耕稼之本使無罪而就死地吾不忍也使劉進自負皮角而行於是老幼號慟告之曰方今法令嚴明此去必犯刑憲使父子不相見矣先生不言乃往經閣院施皮五張令劉進面對三寳具陳殺牛之愆庶解冤結時人歌曰古楊陳寔今談宜甫有無知少年持錢三百來贖綾襖故相欺詐先生賜錢半千少年惡其小惠輒噀唾之值郭奉信叱而退之或曰面上有唾拭之使乾曰拭之是違其怒正使自乾耳先生謂同志曰昨夢二人皆衣皂褐内一人素補兩肩泣告予曰我輩十萬人性命在公所主言訖奔入南巷我逐之見入屠舍劉清顧壁上有頌云我輩己亥十萬人大半己經辛巳殺此門若是不慈悲世世軸頭常厮抹夢覺聞屠豕之聲披衣視之見縛二猪其一兩肩斑白方悟夢中之人己亥猪也辛巳乃劉公所生之歲也乃書頌於壁間屠者心大剛切未能誘化是夕又夢二鶴飛落於蔬圃之間遂建道館招陸道士住持至丁亥年秋先生與遼陽高巨才遊賞於范明叔之遇仙亭酒酣題詩其末句云醉中却有那人扶皆莫曉其意中元後一日重陽眞人自終南抵東牟徑入遇仙亭先生問曰從何方而來曰路遠數千特來扶醉人耳衆皆異其言又問何名爲道曰五行不到處父母未生時相與談玄不覺席上生風遂禮請眞人還居家庭其妻富春氏開簾視之謂先生曰我觀王公面如芙蕖紅目勝瑠璃碧聲若巨鐘語如湧泉堂堂然有正陽之風采當可傾心禮敬由是待以師禮眞人謂先生曰我欲鎖庵百日不食先生從之闢爲環堵風雪四入硯水不冰窗外求詩者往來如織揮毫拂紙立賦立成屢出陽神來坐閣中先生遣人瞻之則庵中儼然默坐自孟冬初吉示詩詞各一首令先生繼和仍賜梨一枚與先生啖之每五日芋栗各六枚十一日爲梨爲二令夫婦共食之自後凡經旬日加一分三旬分三四旬分四至於十旬分爲五十五塊合天地奇耦之數先生漸悟眞理遂捨妻子受簪冠乞食降心眞人乃喜一日眞人言曰馬公破道人曰師何以知之曰昨宵夢飲酒使人詢之先生曰得藥用酒因而飲多眞人先期而知之矣乃登崑崙煙霞洞先生忽患頭痛急如擘裂人言曰馬公將不保朝夕矣眞人曰吾三千里外特化其人令死可乎遂呪水與之飲訖而愈大定九年秋眞人引先生輩四人西邁登州太守紇石烈待以師禮問曰後會何期曰當在梁園後眞人羽化於夷門訖石烈改除南京副留守遂爲喪主眞人羽飛之後先生引徒入京兆乞自然錢得數十千復相約東行取眞人金骨改葬於終南頭梳三髻心喪六年默坐環堵夫三髻者有三吉字乃眞人之諱也故尊而戴之先生志如鐵石行若冰霜縱横闡化十有三年服不衣絹手不拈錢夜則露宿人憐其寒答曰莫訝三冬不蓋被曾留一點在丹田一日謂門人來靈玉曰關中人謂衣裳破碎重修理者云何對曰謂之折洗先生曰東方教門年深殘破吾當拆洗未及半月上司降到符文遣發道人各還本鄕先生遂出關長春丘先生方在隴山一旦謂李大乘曰吾道東矣余雖在牒發中不能出關余若出關則秦中教風掃地無餘矣且隨縁下山州中官民同狀保申復上山而居之先生自出關所到鄕邑垂髫戴白歌舞於道路出境迎迓如鳳凰景星争先睹之爲快也既還鄉里復見屠者劉清教之曰曩日壁間之頌不覺流年二十换矣以日計之日宰三猪十萬之數亦已足矣況公壽八十有三族廣家豪理當止殺公方省悟遂擇日設齋持砧器於郭門外焚之是日往金蓮堂見其六味鹹苦不堪供給先生臨井呪之甘若醴泉郡人號曰靈液構亭立碑傳於四方壬寅年五月東牟大旱嘉苗槁矣徧禱山川一無所應州縣官長禮請先生庶獲霑足名香一爇膏雨沛然逮秋七月郡人設大醮於朝元觀連日陰雨道俗惶恐疑將敗其壇墠先生曰無憂今日必晴果如其言至中元焚詞之際五雲繚繞鸞鶴徘徊其感應之速也如此仲冬行過登州信士韓公焚香致禱曰家有苦井願少垂法力庶回其味先生即往咒之其味頓變甘如飴蜜日晩雨作遂留宿於韓宅戲書云門外雨颼颼天留人不留主公猶自可打破道人頭衆皆莫曉其意須臾有康禪問道於先生忽見簷瓦墮空正中其首衆方駭然悟末後一句也重陽日醮畢天門啓於東南祥雲集於月際郡人莫不瞻拜二月八日先生勸東牟瑯瑘村人悉焚船網風回雪霽忽見重樓翠阜異事駭人乃海市現於南陽也癸卯年四月十三日主行芝陽醮事而風雨大作衆人哀禱庶獲晴霽先生叩齒冥目似有所祝須臾雲斂日出十五日申未間龍尾現於東南移時不滅至夜彩雲貫月四月二十八日行詣芝陽海市乃見自旦至午先生至回光庵馬從仕喜自願焚貸糧券千有餘斛繼有鞠斌聚魚網而焚之海市復現依稀若龍車鶴馭之狀又有郭亨欒周者聚魚網而焚之忽見桑島之間雲陣横斜煙光縹緲若甲馬神兵之勢先生居華亭之環堵林檎一株枝枯心槁將伐爲薪四月初九日沃之以水俄有門人姚鉉持純陽眞人家譜至方知四月十四日生於林檎下先生怡然曰予五月二十日生比及此時决生芽葉乃作頌云天上三十六地下三十六天地入寳瓶七十二候足李公稽首請釋其頌先生笑曰此隱語也他日自當知之五月十七日李公夜夢林檎南北各生二葉旦而視之芽果生矣至先生慶誕之辰緑葉成陰方解其頌云四九三十六日天地相合爲七十二日氣候充足變枯爲榮何有難乎全眞庵移竹兩叢松一株時四月間也枝葉萎黄道友崔公告先生曰此松竹還得再榮乎先生欣然作詩二篇云道家門户號長生意要乾枯改舊形常使數竿常緑緑不教一葉不青青又曰我通生法斡旋生布氣形骸轉换形窗外不惟君子緑庵前又喜大夫青遂以滌面水沃之不旬日抽心展葉金玉庵六月初三日植小松六株衆人稽首曰全眞庵之松竹得復榮旺金玉庵之小松獨何憔瘁先生乃以眞氣三時布之作詩三絶云六月庵前種六松故然返到馬風風三番布氣無多力六願還生有大功又云當時數伏故栽松道友閒閒試馬風我説六株無自活人傳三髻有眞功六月初三種小松六株變色遇扶風祈榮我借重陽氣應效人傳三髻功其松更不改柯易葉青翠可愛邑人遂刊詩於石昔吕純陽以藥一丸詩一絶活萊州龍興寺枯槐於今尚在其詩曰長拖布袖出河東夜宿祇堂古廟中不夜城中留聖跡且教槐老度千冬今先生以詩三絶活芝陽六松前聖後聖其歸一揆芝陽貧士兩足俱廢哀聲甚切先生呪水與之飲訖其行如飛欒武功者久患風痺百藥無功先生呪果服之一日頓愈先生忽一旦歌舞自娱有非常之喜門人忽報曰壬寅年十二月晦日孫仙姑枕肱棄世於河南矣享年六十四歲先生曰昨晩乘絲雲奏仙樂東歸海上吾親見之吾之歌舞者蓋爲此也已預知之矣是歲九月在崑崙契遇庵主持孤魂醮事瑞霞晃耀鸞鶴往來不可勝數東遊文山建七寳庵掘井九尺而不及泉大石阻之先生題云穿鑿須當二九深甘泉自可應清吟遂命匠者再鑿至一丈八尺而寒泉涌出七寳庵牛車載巨棟路經險峻駕車人僵躓於轍間輪轉胸臆其人念丹陽名號並無所損壬寅年三月憩於濟南府舜廟老幼竟欲瞻禮争門而入者幾千人矣門脱其扇卓然而立一無所傷仲冬移栢二株高可數尋植於七寳庵中漸成枯槁先生以眞氣吁之以水沃之旬日之間翠色如初下元日文山加持醮事連日陰雨衆人憂之先生聞空中語云重陽眞人至姚來二公在傍亦聞之十六日晡時縣令尼厖古武節仰視天表乃見一仙人青巾白袍坐白毚碧蓮葉上龜則動揺其尾家人百壽曰乃圖畫中王公也急備香火莫不禮敬忽見眞人回身側卧東南去矣先生作滿庭芳以記之邑人模於石上萊陽請先生赴遊仙觀議行醮事十二月中旬先生報云後三相見至二十二日重陽降世之辰先生令于知一舞歸朝歡仰首而視乃見重陽師眞與和公師叔立於空中冉冉然先生曰堂堂歸去也作箇快活仙又云正到峥嶸處争如拂袖歸呼弟子劉眞一告之曰汝等要作神仙豈爲容易若遇魔難慎勿退怠謹而愈謹然後可得領吾此言不可忘也遂東首而卧謂衆曰我開眼也見合眼也見元來見不在眼心中了然則無所不見與門人談笑夜將二鼓風雨大作雷震一聲先生枕肱而羽飛矣酒税監郭復中聞扣門甚急出而視之即先生也引入共話索紙書頌曰長年六十一在世無人識平地一聲雷浩浩隨風起良久告别趨而去之鄕人有劉錫者是夜見屋隙間明如然炬遲明視之見紙一幅用竹竿取下乃四句詩云三陽會裏行功圓風馬乘風已作仙勸汝伏降龍共虎自然有分亦昇天後題先生諱宇急投火中焚之滿家如旃檀之馨少頃人報云昨夜先生羽化矣方知郭復中與劉錫所見者陽神也凡經七日神色儼然葬於遊仙觀初東華庵有松數十株枝葉皆變白色先生曰此松之白殆爲我歟甲辰年正月十八日巳午間進士劉紹祖等見空中鸞鶴徘徊雲霞變化重陽眞人雲冠絳服丹陽先生三髻素衣現於雲表移時方去五月十二日己亥之晩先生忽現於應仙橋之西北仙童侍側少頃爲寒雲所掩當時于信等二十一人皆見其事先生葬後邑人常疑陜西徒衆盜去仙骨至乙巳年正月二十四日縣宰劉公出棺視之容貌若生肢體柔軟乃櫛髮更衣四方聞之争爲瞻禮輪蹄絡繹至九月復以石槨葬之所有分梨十化漸悟精微摘徴三寳行化金玉等集刊行於世味其文義皆貫通三教囊括五行酬今和古託物喻人玄談妙理視蓬島如目前智劍慧刀逐三尸於身外遵之則遷善遠罪悟之則入聖超凡豈小補哉贊曰首遇重陽先明九轉十度分梨暗傳消息六回賜芋别有機關通一氣未生之前指五行不到之處斡開玉户透入金門燦日月於壺中聚雲霞于鼎内屣脱半州之産頂分三髻之髽數十年卧雪眠霜幾萬里遊山涉水七朵金蓮最先放徹五篇秘語獨自傳來霹靂一聲不負紅霞之約因縁萬劫還歸碧落之遊啓迪全眞發揮玄教者也張神童詩云海上文章第一儒重陽曾向醉中扶古今多少修眞者應比先生一箇無金蓮正宗記卷之三
