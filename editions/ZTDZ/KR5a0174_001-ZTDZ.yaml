front:
  text: 金蓮正宗記卷之一
  hash: sha256:cf8adfce973accbcc7c105a3f84d1034359bb4b732d0eab379661840181e3cd5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0174_SJB_001-030344b, image: sjb/03/030344b.png}
body:
  text: 林間羽客樗櫟道人編東華帝君帝君姓王氏宇玄甫道號東華子生有竒表幼慕眞風白雲上眞見而愛之曰天上謫仙人也乃引之入山授之以青符玉篆金科靈文大丹秘訣周天火侯青龍劍法先生得之拳拳服膺三年精心盡得其妙遂退居於崑崙山煙霞洞頤神養浩久之結草庵以自居篆其額曰東華觀韜光晦迹百有餘年而人未之知也後徙居代州五臺之陽山中今有紫府洞天山下有道人縣在人間數百歲殊無衰老之容開闡玄宗發揮妙藴陰功濟物玄德動天故天眞賜號曰東華帝君又曰紫府少陽君授度門人正陽眞人鍾離雲房嗣弘法教所有聖遠不能具述全眞之道由此濫觴故立之以爲全眞第祖也賢曰帝君之仙名如此其赫焕道價如此其高大何故不見犯於漢史鄉里世族年代行藏如此其黮暗也僕應之曰仙道多隱非垂世立教之急務故史官滅裂逸漏而不書兼儒家之所惡言者也年歲深遠碑刻泯滅由是不得而詳焉且兩漢四百年間幽人隱士不可勝計豈數千帙故紙能盡録之乎且全眞之道醖釀久矣自太上傳之於金母金母傳之於白雲白雲傳之於帝君天其意者將以此一枝大教付於若人豈草草學者之所能負荷哉必自紅霞丹景中精選其可以爲群仙領袖者然後挺於下方其初降也豈無奇蹤異跡輝天晃地者哉蓋隱而不録史官之忌也故於傳尾諄諄而明言之庶幾學者讀之有所歸過焉詩云隱隱龍樓靄瑞霞風流紫府少陽家崑崙高聳光千丈初放全眞第一花正陽鍾離眞人謹按廬山金泉觀記云曾祖諱朴祖諱守道父諱源當後漢末年皆據要津有功於國世濟其美先生諱權宇雲房號正陽子京兆咸陽人也少工文學尤喜草聖身長八尺七寸髯過臍下目有神光仕至左諫議大夫因表李堅邊事不當謫爲南康知軍漢滅之後復仕於晋及武帝時與偏將周處同領兵事屨出征討已而失利逃於亂山不知所往偶見老氏者流問而不語但舉手而指東南公遽往焉行六七里峰巒峭拔松栢參差中有樓閣金碧炫燿二青衣應門而立揖而問曰此何方也對曰紫府少陽君之所居東華帝君之别業也吾師侯君久矣遂延入館中拜見帝君方談笑間童子報云客仙至矣帝君出門迎三仙客鍾離自牖窺之見一仙人身長八尺青衣練帶草履雲冠神目如電堂堂乎哉次一人素袍大袖結於頸後横握鐵笛次一人容貌魁梧挂絳紅袍頂華陽巾跨蒼毛虎横按笻枝遂邀三仙入於别館進酒果肴饌語笑諠譁聞於館外青衣曰多少紅塵客何由到此來洞門無鎖鑰今日爲誰開衆仙皆笑曰昔爲鐵衣子今逢達道人又云奈何壯士侵莊上耶鐵笛仙曰紫府少陽家龍樓靄瑞霞滿斟千日酒常翫四時花跨虎仙曰親指蓬萊路何須更問津神仙知有分幸矣拜高眞帝君答曰偉矣青雲器相逢一解顔丹臺元有籍聊謫在人間衆仙皆醉命駕言歸帝君送之各跨鸞鳳冉冉而入於雲中帝君遂回復與鍾離談玄終日情愛深密甚於素交遂授之以赤符玉篆金科靈文大丹秘訣周天火侯青龍劍法公服膺受教一聞千悟既盡其妙辭而下山椎髻布衣積行救人調神鍊氣變化無常至唐文宗開成年間因遊廬山遇吕公洞賓授以天遁劍法自稱天下都散漢後隱居於晋之羊角山天眞賜號曰太極左宫保生眞人曾於邢州開元寺觀音殿後題詩二絶筆勢飄逸有龍飛之狀其詩曰得道眞仙不易逢幾時歸去願相從自言居處連滄海别是蓬萊第一峰又云莫厭追歡語笑頻尋思離亂可傷神閒來屈指從頭數得到清平有幾人宋朝劉從廣於皇祐四年九月九日立石刊勒又有頌云見錢如患眞仙子遇色如讎大丈夫養氣氣如龜喘息煉形形似鶴肌膚生我之門死我户幾箇惺惺幾箇悟夜來鐵漢細尋思長生不死由人做又撰眞仙傳道集洎靈寳畢法授於吕公言天地造化陰陽交泰内丹養命之道秘於玄都寳藏以爲萬世龜鏡此後復歷廬山登三級紅樓冉冉而昇空矣乃五月二十日贊曰道不可以虚妄得仙不可以詐偽成惟貴夫眞功實行也觀正陽子之未遇但鐵衣武夫耳及其拜東華帝君之後分玉篆以通天按金科而動地鑄劍而青龍入匣燒丹而紫鳳朝元養氣而喘息如龜煉形而肌膚似鶴自漢歷唐五百餘歲止度一純陽老仙而已甚矣哉人之難化也乃遊廬山登三級紅樓冉冉然飛上太虚自爾以來全眞教法漸有綸緒故可以爲金蓮正宗第二祖也詩云鐵笛曾聞跨虎仙金丹親向帝君傳臨行付與純陽子三級紅樓上碧天純陽呂眞人謹按岳州青羊觀石壁記云曾祖諱景仕至翰林學士金紫光禄大夫祖諱獻位至河南府尹父諱渭禮部尚書先生諱巖宇洞賔蒲州蒲坂永樂人也唐德宗興元十四年丙子四月十四日生於林禽樹下至唐文宗開成元年丁酉歲擢進士第年二十有二歲也龍姿鳳目鬢眉疏秀美鬚髯金水之相頂華陽巾服逍遥衣狀貌類張子房太史公之爲人後任五峰廬山縣令因暇日遊廬山之勝跡偶與正陽先生相遇一話一言之間心與心契密受大道天遁劍法龍虎金丹秘文賜號純陽子由是之後休官棄爵專心向道師資膠漆未嘗暫離俄而之間仙人數輩特邀先生東赴蓬萊之會吕公泣下拜啓師眞雲車東邁何日言歸遂以詩禱之曰功滿來來際會難又聞東去幸仙壇杖頭春色一壺酒頂上雲攢五嶽冠飲海龜兒人不識燒丹符子鬼難看先生去後身須老乞與貧儒换骨丹正陽答云金丹一粒定長生須向眞鉛鍊甲庚火取南方赤鳳髓水求北海黑龜精鼎攢四季中央合藥運三元八卦行齋戒與君成九轉一丸入腹鬼神驚詩畢遂去自是之後吕公隱於市廛或貨丹而救疾苦或賣墨以惠貧窮積功累行以至成眞神化無方或隱或顯多遊蒼梧南越之間嘗有詩云朝遊南越暮蒼梧袖有青蛇膽氣麤三入岳陽人不識高吟飛過洞庭湖又宋政和間洛陽上清宫題詩二絶曰吾來兩次謁三清四大蒼生眼不明今日却歸塵外去五雲深處指神京又云五雲深處是吾鄉四大皆非不可常今日不知身是客來朝只在這邊傍又於戊子歲中秋西京察判宅有道者來謁閽人阻難之間已在堂上巍然而坐曰願乞斗酒察判賜之一飲而竭仍索素絹三尺以酒噀之摶入瓶中不辭而去急令追之已失所在探瓶中展絹而視之上有畫像與先生狀貌無别神清骨秀耳出三毫後有二絶云飲酒須當百十杯養壽河清千萬迴至道日新通事塞玄開早放地中雷又云千古閻浮自在身唯然上善可開陳幾多念念承予教隔在閻浮寄下眞後題曰純陽子宋宣和間泰山岱嶽觀石壁間題一聯云昔年留宇識曾來事滿華夷徧九垓後因雷雨大作蛟龍戰鬬山勢崩摧唯先生墨跡儼然無損後九十年再遊於此復題一聯云無奈蛟龍知我意故留蹤跡不沉埋又題一絶云昔日曾遊此經今九十春紅塵多少客誰是識予人後書云回公作隨方顯跡不能備録平生述作數百篇目之曰傳劍集飛騰變化接引者不知其數後遊歷鄂州昇黄鶴樓冉冉飛昇日當卓午五月二十日也市廛中人瞻仰企慕但見隱隱入于雲中矣贊曰自古得道神仙數甚多矣然而鍾吕之名獨顯於世雖樵童牧竪婦人女子皆知之者何也蓋慈悲之心接物利生無所不至感人之最深耳老松之精無情之物也猶且區區訓誨使成無上神仙况於人爲萬物之最靈者乎三入岳陽佩丹篆千年之術重遊岱觀誦黃庭兩卷之經採南方赤鳳之精奪北海黑龜之髓一粒定超於物外九還普散於人間點石餅而作黃金折柳枝而成白骨餌之者回顔换質遇之者起死回骸百怪形潜袖有青蛇之劍九天詔下身飛黃鶴之樓故曰名者天下之公器不可以多得其信然乎詩云三尺青蛇照瞻寒乾坤移向掌中看一從黃鶴樓頭去留與人間换骨丹海蟾劉眞人先生姓劉諱操宇宗成號海蟾公燕山人也年一十六歲以明經擢甲科累遷至上相平昔好談性命之説然終不得其妙一旦有道者來謁邀坐堂上以賓禮待之問其姓名默而不答但自稱正陽子願乞鷄卵十枚金錢一文安金錢於桉上而高累十卵危而不墜海蟾歎曰危哉先生曰相公身命俱危更甚於此海蟾頓悟先生乃收卵而藏之擘金錢而棄之遂辭而去海瞻於是催設夜宴佯托沉醉以杯盤寳器俱擲於地而碎之夫人洎兒女輩莫不怒責比及朝退猶未解顔輒解印而辭官佯狂歌舞自述歌曰余縁太歲生燕地憶昔三光分秀氣卯角圓明霜雪心十六早登科甲第紆宋懷紫金章貴各各綺羅輕挂體而今位極掌絲綸倏忽從前春一寐昨宵家宴至三更兒女夫人并待婢被予佯醉撥杯盤擊碎珊瑚珍玉器兒女嫌夫人惡忘却從前衣食樂來朝朝退怒猶存些兒小過無推托因此事方省悟前有輪迴誰救度退官納印棄榮華慷慨身心求出路遂易衣而道處於卑賤以辱其形又述一聯云抛離火宅三千口屏去門兵百萬家厥後遠泛秦川陶眞於太華之前遁跡於終南之下頤精煉氣以至成眞忽一旦於代州壽寧觀以墨水潑成龜鶴齊壽四字納一丈餘並自寫眞於壁間繼有西蜀成都府青羊宫以墨水潑成清安福壽四字代州鳳凰山來儀觀潑成壽山福海四宇三處相隔不啻數千里皆同日而書之以表其神變無方耳後題長篇詩云醉騎白驢來倒提銅尾㨀引箇碧眼奴擔著獨胡癭自忘麂世事家住葛洪井不讀黄庭經豈燒龍虎鼎獨立都市中不受俗人請欲携霹靂琴去上崑崙頂吴牛買十角溪田耕半頃種黍釀白醪便是仙家景醉卧古松陰間立白雲嶺要去即便去直入秋毫影隨代所顯靈跡甚多不能具述聊記其大槩云贊曰甚矣富貴之難捨也眷屬之難離也苟有能捨而離之者未有不登大羅而遊玉京者也自古迄今吾於海蟾先生見之矣由進士科登燕國相懷金章而恩霑九族曳紫綬而名滿四方一旦遇正陽子悟金錢之决破歎累卵之終危碎七寳而爲塵埃抵萬金而如糞壤抛火宅者三千口屏門兵者百萬家辭官而狂舞市廛納印而棲遲山野煉氣於終南之下陶眞於太華之前故能蹈水火以無傷貫金石而罔礙間騎紫鳳手携霹靂之琴醉走白驢脚踏崑崙之頂潑墨而書成四字化形而地隔千山有以見道不負人也信矣詩云擊碎珊瑚不相燕歸來高卧白雲邊携琴直上崑崙頂冷笑浮生盡小年金蓮正宗記卷之一
