front:
  text: 金蓮正宗記卷之五致八
  hash: sha256:d9db83dd2e84657e0761f00bdf1309bff872f3834436d70f62ba05f5c9e5a5b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0174_HFL_005-001a, image: hfl/0076/0076-032.png}
body:
  text: 林間羽客樗櫟道人編玉陽王眞人先生諱處一號曰玉陽子王其姓也家居寧海之東牟幼喪其父事母至孝體貌魁梧爲兒童時不雜嬉戲好誦雲霞方外之語七歲遇東華教主授以長生久視之訣年一十有四歲也偶步山間見一老翁坐於盤石之上呼之使來摩其頂而謂之曰汝他日必揚名於帝闕當與玄門作大宗師言畢乃起曳杖而行先生從而不捨啓曰公何人也答曰我乃玄庭宮主也回首不知所在自兹之後語言放曠不與世合行止顛狂適大定春二月中因暇日遊宴至范明叔之遇仙亭乃見終南山重陽祖師在焉祖師觀其骨格非凡乃曰汝肯從吾否乎先生曰僕所願也敢不唯命遂侍左右與丘劉譚馬定爲莫逆之交修眞秘訣靡不窮討祖師呼而告之曰文登縣鐵查山雲光洞是汝登眞之所可以往居幸無怠懈汝之名號他日吾與汝送去先生於是拜辭而歸隱於洞中至四月間祖師將遊龍泉借范明叔傘以蔽日丘劉譚馬先行祖師在後可半里許忽擲傘於空中飄飄然起西北而飛不知所往丘劉輩驚反走而問其所由曰摶扶揺而上不知所以然也自辰至晡傘乃墮於雲光洞前擊破其柄中有道號曰陽子名處一音竹篇韻中本無此宇蓋祖師之所撰也宇作七人表金蓮七朵之數大約擲傘處與雲光洞相去二百餘里先生得之他日來謝祖師贈之詩云修行事理記丁寧只要心中靜裏明眼界不生龍自住鼻門無閉虎常停舌根退味心神爽耳内除聲腎水清南北混融歸一處東西交媾滅三彭木金厮杈盤桓住嬰姹相隨自在行結作金丹出頂上五光射透彩雲棚先生拜而受之從此之後往來於登寧之間夜則歸於雲光洞口偏翹一足獨立者九年東臨大海未嘗昏睡人呼爲鐵脚先生丘眞人贊之曰九夏迎陽立三冬抱雪眠如此鍊形九年而入於大妙順行逆行或歌或舞出神入夢接物利生適大定戊申歲世宗聞其道價甚高仍遣使以幣聘之遂赴闕僧徒懹嫉妬心多輸金於中使以爲先生非眞仙也鴆酒可以驗之上以爲然乃賜之三杯先生飲訖殊不煩躁終莫能害上乃驚謝賜之金冠法服駟馬安車勑建全眞堂以居之仍御書額己酉歲清明後五日得中㫖還故山復賜之金帛鉅萬表而辭之逮承安三年秋八月章宗詔求隱逸召至闕下朝於便殿應對如流天子大悦勑賜體玄大師創修眞觀以居之泰和壬戌歲勑赴亳州太清宮主行普天醮事萬鶴翶翔太上現於雲中面赭於曰先生有詩云聖感傳宣出洞天金門演教慶無邊東方雲海玉陽子特受皇恩第四宣自此之後還歸雲光洞度道士者千餘衆東牟有遲金者豪家也待師甚厚一旦忽冒風邪百醫不能療遂不起先生憫之即令煮青魚五十尾以餅捲而餐之既飽而起行步如飛一方駭然望風從化師乞食至登州福山縣見潘山人身殁將葬以手揓兩耳喝言地府不得收須臾即起飲啖自若其子多以財貨謝之先生微笑拂袖而去方在寧海時二兇徒欲加害於先生各持杖邀師同飲俟醉而共加捶焉未及其酣二人自相敺擊其人中痛而死觀者驚惶以爲必多相累無所逃竄先生即大呼曰東嶽不得收須臾即甦衆憂遂解行至濟陽縣告法名者甚多將及三鼓先生濡毫落紙書作賊人二宇復厲聲言有賊衆皆出門見執兵器者數人驚惶逃竄不知所往聖水洞前有巨石斜出可數丈許遊歷者頗以爲懼衆議去之鎚鑿俱興數日擊毁百分未及其一師笑而往運鎚三擊声若雷霆石已墜矣仍有紫煙罩滿巖谷三日方散大定丙午歲重陽降跡之日丹陽飛骨之期先生赴琅琊村誘化船户盡焚魚網遂感海市現於東南重樓翠阜貝闕珠宫驚駭數郡因借東坡韻書一篇文多不載以至禱龍即雨烹雞復還漏瓶注酒枯橛生枝不可備録逮眞祐丁丑歲四月二十三日有五色雲自東南來二青衣捧詔而下旌幢蔽天衆皆瞻禮先生告門人曰三日已前衆聖皆至言訖焚香朝禮十方索筆書頌云躍出乾坤造化權神光晃朗遍諸天飄飄鶴馭超三界喜受金書玉帝宣落筆而卧奄然返眞祥光溢於山谷瑞氣覆於川原數日不散平生所集歌詩近千餘首目之曰清眞集雲光集盛行於世贊曰鍊精玉陽韜光聖水竹傘柄中暗傳名號鐵查山下多做工夫三冬抱雪以安眠九夏迎陽而竚立故能混南北而歸一處媾東西而滅三彭累遭仙聖之傳言四感帝王之降詔飲鴆酒而容光不改焚魚網而海市横空潘公已死聽三喝以重甦遲老久癱賜一餐而再起童子出從於鑪内老君高顯於雲端手舉鐵錘巨石已聞於落澗口傳王訣群山竟見於揺峰無根橛上枝葉重生没底壺中酒醪不漏鶴降而壇前屢舞雞烹而架上重鳴盜者執兵而反逋兇徒舉杖而自敺躍出乾坤之造化斡回日月之機關席下門徒親度者數千百衆平生手段共傳者三十六端故能受玉帝之宣赴金蓮之會也張神童詩云名高曾受帝王宣感得金書賜體玄道德已成神已化鐵查山下水依然廣寧郝眞人先生諱璘號恬然子自稱太古道人家世寧海歷代遊宦先生朝列之從弟也事母至孝資質豐美不慕榮仕深窮卜筮之數黄老莊列未嘗釋手凡遇林泉幽寂之地則徘徊而終日忘返大定丁亥秋貨卜於市士大夫環列而坐重陽最後至背面而坐先生曰何不回頭重陽曰只恐先生不肯回頭先生頗驚遽起作禮邀赴他所閒話往來問答如石投水先生獻詩云同席諸君樂太古未明黑白希夷路今朝得遇達人吟伏望先生垂玉句重陽答曰口愛郝公通上古口談心甲神仙路足間翠霧接來時日要先生清靜句先生覽之得意而歸至來年戊子歲三月中專往崑崙山煙霞洞焚香敬謁甘洒掃之役重陽乃賜之法名曰大通號曰廣寧子與丘劉譚馬同侍左右逮七月間重陽令諸弟子皆歸寧海惟丘公侍側不數日復命丘公往呼太古旣至乃告之曰我有布衲剪去兩袖我要替背與汝過冬自綴袖去先生拜而受之蓋象古人傳衣之法也自是之後重陽南歸汴梁先生往來河北乙未歲乞食於沃州方悟重陽密語涣然開發遂往橋上默然靜坐饑渴不求寒暑不變人饋則食不饋則否雖有人侮狎戲笑者不怒也志在忘形如此三年人呼爲不語先生一夕天色昏冥偶醉者過以是蹴先生於橋下默而不出者七日人不知者以爲先生何往忽值客官乘馬將過而馬驚躍捶之不進客遂墮馬問左右曰橋下必有怪事不然何吾馬之驚也命左右往視之則一道者奄然正坐間之則不語以手書地曰不食七日矣州民聞之争往饋食焚香請出但揺手不應只於橋下復坐三年水火顛倒陰陽和合九轉之功成矣乃忻然而起杖屨北遊盤桓於眞定間往來請益者不知其數大興宫觀昇堂誘化玄風爲之熾盛以悟南柯示衆云地肺重陽子崑崙太古仙二人結約未生前托居凡世飛下大羅天共闡玄元教行藏度有縁奈何不悟似流泉别後相逢再約一千年自明昌後復歸東州别建琳宇多度門衆預於三年以前命匠者鑿爲地宫甃之以甓日凡一往偃息其中告之曰臘月三十日打算如是三年法體康健語門人曰師眞有蓬萊之約吾將歸矣言訖卧而返眞正當臘月三十日也享春秋者八十有四平生歌頌深明龍虎顛倒之説牽引卦爻升降之數目之曰太古集大行於世贊曰廣寧道人窮探易象憎俗態而頓抛妻子慕玄風而喜受簪冠歸隱於煙霞洞中恭禮於重陽席下工夫展轉手段施呈茂揚太古之精華吸盡全眞之骨髓按龜蛇而交結運龍虎以盤旋寧海帀中暗得傳衣之妙沃州橋下堅持鍊氣之功身外觀身口中安口三彭滅而水火顛倒四氣流而鉛汞調和自然九轉丹成三華果結卒赴蓬壺之舊約預占臘月之盡期若非跡寄人間心通象外者其孰能與於此乎張神童詩云處市居山任自然靜中叅透易中玄而今醉卧蓬萊上萬古人傳太古仙清靜散人仙姑者孫忠翊之幼女也家世寧海初母夢七鶴毰毸舞於庭中良久六鶴飛去獨一鶴入于懷中覺而有娠乃生是女性甚聰慧在閨房中禮法嚴謹素善翰墨尤工吟詠既笄適馬氏生三子皆教之以義方適大定丁亥冬重陽先生來自終南馬宜甫待之甚厚仙姑未之純信乃鎖先生於庵中百有餘日不與飲食開關視之顔米勝常方始信奉仍出神入夢種種變現懼之以地獄誘之以天堂十度分梨六番賜芋宜甫遂從師入道仙姑尚且愛心未盡猶豫不决更待一年始抛三子竹冠布枹詣本州金蓮堂禮重陽而求度先生贈之詩曰分梨十化是前年天與佳期本自然爲甚當時不出離元來只待結金蓮仍賜之法名曰不二道號曰清靜散人授以天符雲篆秘訣而已重陽乃南歸汴梁而委蜕焉丘劉譚馬負其仙骨歸葬終南仙姑聞之迤邐西邁穿雲度月卧雪眠霜毁敗容色而不以爲苦逮壬辰之春首亦抵京兆趙蓬萊宅中與丹陽相見叅同妙㫖轉涉埋窟丹陽乃贈之以鍊丹砂曰奉報富春姑休要隨予而今非婦亦非夫各自修完眞面目脱免三塗鍊氣莫教麤上下寬舒綿綿似有却如無箇裏靈童調引動得赴仙都仙姑謝而受之相别東西各處一方鍊心環堵七年之後三田返復百竅周流遂起而東行遊歷洛陽勸化接引度人甚多一旦書卜算子云握固披衣候水火頻交媾萬道霞光海底生一撞三關透仙樂頻頻奏常飲醍醐酒妙藥都無頃刻間九轉丹砂就書畢告門人曰師眞有約各赴瑶池仙期至矣沐浴更衣問左右曰天氣早晚皆對曰卓午矣遂結跏趺奄然端坐而處順焉顔色如生香風滿室瑞氣繚繞低覆原野終日不散時壬寅年十二月二十九日也當此之際丹陽方居寧海環堵之中仰而視之見仙姑乘五色祥雲飄飄然在空懸之中笑而言曰吾先歸蓬閬矣丹陽聞之拂衣而起舞因作醉仙令以自慶云贊曰不二名高守一功大降自富春之族生從忠翊之家配丹陽超世之才殖寧海半州之産割愛頓抛於三子投玄往拜於重陽毁光容而西度終南冒風霜而東離海上七年環堵鍊成九轉丹砂一句眞詮撞透三關正路六回賜芋十化分梨栽培劫外之因縁反復壺中之造化養胎仙而心遊汗漫委蜕殻而身到蓬萊大矣哉懋矣哉獨分一朵之金蓮得預七眞之仙列者也張神童詩云洗盡胭脂兩臉霞十年辛苦種黃芽功成穩跨青鸞背開到金蓮第七華金蓮正宗記卷之五終
