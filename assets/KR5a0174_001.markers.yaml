  - {type: variant, offset: 3361, length: 151, content: 七寳而爲塵埃抵萬金而如糞壤抛火宅者三千口屏門兵者百萬家辭官而狂舞市廛納印而棲遲山野煉氣於終南之下陶眞於太華之前故能蹈水火以無傷貫金石而罔礙間騎紫鳳手携霹靂之琴醉走白驢脚踏崑崙之頂潑墨而書成四字化形而地隔千山有以見道不負人也信矣詩云擊碎珊瑚不相燕歸來高卧白雲邊携琴直上崑崙頂冷笑浮生盡小年金蓮正宗記卷之一, CK-KZ: ''}
